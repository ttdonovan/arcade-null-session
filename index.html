<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Atlas: Null Session</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d14;
        }
        canvas { display: block; }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0d0d14;
            z-index: 100;
            font-family: 'Courier New', monospace;
        }
        #loading-screen .title {
            color: #e6b84d;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }
        #loading-screen .bar-track {
            width: 200px;
            height: 4px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        #loading-screen .bar-fill {
            width: 40%;
            height: 100%;
            background: #e6b84d;
            border-radius: 2px;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: translateX(-20%); }
            50% { opacity: 1.0; transform: translateX(120%); }
        }
        #loading-screen .label {
            color: #555;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
        }
    </style>
  <script type="module" crossorigin src="/arcade-null-session/assets/index-DwBkqDpl.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="title">STAR ATLAS: NULL SESSION</div>
        <div class="bar-track"><div class="bar-fill"></div></div>
        <div class="label">LOADING</div>
    </div>
    <canvas id="bevy-canvas"></canvas>
</body>
</html>
